version: '3.8'

services:
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: cimatec
      MYSQL_DATABASE: kids_store
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      
  app:
    build: .
    container_name: app-estoque
    restart: always
    ports: 
      - "8080:8080"
    depends_on:
      - db
        
volumes:
  db_data: