<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="css/reset.css"/>
    <link rel="stylesheet" href="css/color.css"/>
    <link rel="stylesheet" href="css/login.css"/>
    <title>Sistema de Estoque — Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="login-bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>
    <form action="login" method="post" class="login-form">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-icon">📦</div>
                <div class="brand-text">
                    <span class="brand-kids">Sistema de </span><span class="brand-store">Estoque</span>
                </div>
                <p class="brand-sub">Controle de Estoque</p>
            </div>
            <div class="login-divider"></div>

            <div id="msgCadastro" class="msg-login sucesso" style="display:none">
                ✅ Cadastro realizado! Faça login para continuar.
            </div>
            <div id="msgErro" class="msg-login erro" style="display:none">
                ❌ Usuário ou senha incorretos. Tente novamente.
            </div>

            <div class="login-field">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" autocomplete="username" required/>
            </div>
            <div class="login-field">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
            <a href="pages/cadastro.html" class="btn-cadastrar-login">Cadastrar</a>
        </div>
    </form>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get("usuario")) {
            document.getElementById("usuario").value = params.get("usuario");
            document.getElementById("msgCadastro").style.display = "block";
        }
        if (params.get("erro") === "1") {
            document.getElementById("msgErro").style.display = "block";
        }
    </script>
</body>
</html>
