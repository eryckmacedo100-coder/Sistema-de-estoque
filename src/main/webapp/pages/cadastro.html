<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/color.css">
        <link rel="stylesheet" href="../css/cadastro.css">
        <title>Cadastro — Sistema de Estoque</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro">Sistema de Estoque</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main id="main">
            <form action="../cadastro" method="POST" id="formCadastro">
                <div class="container">
                    <div class="dadosPessoias">
                        <label for="nameFirst">Nome</label>
                        <input type="text" name="nameFirst" id="nameFirst" placeholder="Digite o seu Nome" required/>

                        <label for="sobrenome">Sobrenome</label>
                        <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite o seu Sobrenome" required/>

                        <label for="matricula">Matrícula</label>
                        <input type="text" name="matricula" id="matricula" placeholder="000000" maxlength="10" required/>

                        <label for="cpf">CPF</label>
                        <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" maxlength="14" required/>

                        <p>Sexo</p>
                        <select name="sexo">
                            <option value="">Selecione o Sexo</option>
                            <option value="1">Masculino</option>
                            <option value="2">Feminino</option>
                        </select>

                        <label for="dtaNascimento">Data de nascimento</label>
                        <input type="date" name="dtaNascimento" id="dtaNascimento" required/>

                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="exemplo@email.com" required/>

                        <label for="telefone">Telefone</label>
                        <input type="tel" name="telefone" id="telefone" placeholder="(00) 0 0000-0000" maxlength="16" required/>

                        <label for="usuario">Usuário</label>
                        <input type="text" name="usuario" id="usuario" placeholder="Digite o usuário" required/>

                        <label for="password">Senha</label>
                        <input type="password" name="password" id="password" placeholder="Digite a senha" required/>
                        <label for="confirmarSenha">Confirmar Senha</label>
                        <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required/>

                        <label for="funcao">Função</label>
                        <input type="text" name="funcao" id="funcao" placeholder="Ex: Estoquista" required/>
                    </div>

                    <div class="containerEndereco">
                        <label for="cep">CEP</label>
                        <input type="text" name="cep" id="cep" placeholder="00000-000" maxlength="9" onblur="preencherCampo()"/>

                        <label for="endereco">Endereço</label>
                        <input type="text" name="endereco" id="endereco" />

                        <label for="cidade">Cidade</label>
                        <input type="text" name="cidade" id="cidade" />

                        <label for="bairro">Bairro</label>
                        <input type="text" name="bairro" id="bairro" />

                        <label for="estado">Estado</label>
                        <input type="text" name="estado" id="estado" />

                        <label for="numero">Número</label>
                        <input type="text" name="numero" id="numero" placeholder="Ex: 123" />

                        <label for="complemento">Complemento</label>
                        <input type="text" name="complemento" id="complemento" />
                    </div>

                    <div class="btn">
                        <button type="submit">Cadastrar</button>
                    </div>
                </div>
            </form>
        </main>
        <script src="../js/cep.js"></script>
        <script src="../js/mascaras.js"></script>
        <script src="../js/validacaoCadastro.js"></script>
    </body>
</html>
