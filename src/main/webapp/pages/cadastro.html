<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/color.css">
        <link rel="stylesheet" href="../css/dashboard.css">
        <link rel="stylesheet" href="../css/cadastro.css">
        <title>Cadastro de Usuário</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro">Sistema de estoque</h1>
            <nav id="menu">
                <ul class="menu-lista">
                    <li><a href="/pages/projeto.html">Início</a></li>
                    <li><a href="gerenciamento.html">Gerenciamento</a></li>
                </ul>
            </nav>
        </header>

        <main id="main">
            <form action="../cadastro" method="POST">
                <div class="cadastro-wrapper">
                    <h2 class="cadastro-titulo">Cadastro de Usuário</h2>

                    <div class="cadastro-grid">
                        <!-- Dados pessoais -->
                        <div class="cadastro-secao">
                            <h3 class="secao-titulo">Dados Pessoais</h3>

                            <div class="campo">
                                <label for="nameFirst">Nome</label>
                                <input type="text" name="nameFirst" id="nameFirst" placeholder="Seu nome" />
                            </div>
                            <div class="campo">
                                <label for="sobrenome">Sobrenome</label>
                                <input type="text" name="sobrenome" id="sobrenome" placeholder="Seu sobrenome" />
                            </div>
                            <div class="campo">
                                <label for="matricula">Matrícula</label>
                                <input type="text" name="matricula" id="matricula" placeholder="Sua matrícula" />
                            </div>
                            <div class="campo">
                                <label for="cpf">CPF</label>
                                <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" />
                            </div>
                            <div class="campo">
                                <label for="sexo">Sexo</label>
                                <select name="sexo" id="sexo">
                                    <option value="">Selecione</option>
                                    <option value="1">Masculino</option>
                                    <option value="2">Feminino</option>
                                </select>
                            </div>
                            <div class="campo">
                                <label for="dtaNascimento">Data de Nascimento</label>
                                <input type="date" name="dtaNascimento" id="dtaNascimento" />
                            </div>
                            <div class="campo">
                                <label for="email">E-mail</label>
                                <input type="email" name="email" id="email" placeholder="exemplo@email.com" />
                            </div>
                            <div class="campo">
                                <label for="telefone">Telefone</label>
                                <input type="tel" name="telefone" id="telefone" placeholder="(00) 00000-0000" />
                            </div>
                            <div class="campo">
                                <label for="usuario">Usuário (login)</label>
                                <input type="text" name="usuario" id="usuario" placeholder="Nome de usuário" />
                            </div>
                            <div class="campo">
                                <label for="password">Senha</label>
                                <input type="password" name="password" id="password" placeholder="Sua senha" />
                            </div>
                            <div class="campo">
                                <label for="funcao">Função</label>
                                <input type="text" name="funcao" id="funcao" placeholder="Ex: ADMIN, OPERADOR" />
                            </div>
                        </div>

                        <!-- Endereço -->
                        <div class="cadastro-secao">
                            <h3 class="secao-titulo">Endereço</h3>

                            <div class="campo">
                                <label for="cep">CEP</label>
                                <input type="text" name="cep" id="cep"
                                       placeholder="00000-000" onblur="preencherCampo()" />
                            </div>
                            <div class="campo">
                                <label for="endereco">Endereço</label>
                                <input type="text" name="endereco" id="endereco" placeholder="Rua, Av..." />
                            </div>
                            <div class="campo">
                                <label for="numero">Número</label>
                                <input type="text" name="numero" id="numero" placeholder="Ex: 123" />
                            </div>
                            <div class="campo">
                                <label for="complemento">Complemento</label>
                                <input type="text" name="complemento" id="complemento" placeholder="Apto, Bloco..." />
                            </div>
                            <div class="campo">
                                <label for="bairro">Bairro</label>
                                <input type="text" name="bairro" id="bairro" />
                            </div>
                            <div class="campo">
                                <label for="cidade">Cidade</label>
                                <input type="text" name="cidade" id="cidade" />
                            </div>
                            <div class="campo">
                                <label for="estado">Estado</label>
                                <input type="text" name="estado" id="estado" />
                            </div>
                        </div>
                    </div>

                    <div class="cadastro-btn">
                        <button type="submit">Cadastrar</button>
                    </div>
                </div>
            </form>
        </main>

        <script src="../js/cep.js"></script>
    </body>
</html>
