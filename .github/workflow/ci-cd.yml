name: CI/CD - Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      
jobs:
  build:
    name: Build projeto
    runs-on: ubuntun-latest
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        
      - name: Configuração Java 21
        uses: action/setup-java@v4
        with:
          java-version: '21'
          distribuition: 'temurin'
          cach: maven
          
        - name: Build da aplicação
          run: mvn clean package -DskipTest
          
        - name: Salvar
            uses: action/upload-artifact@v4
            with:
              name: app-war
              path: target/*.war
              retention-day: 7